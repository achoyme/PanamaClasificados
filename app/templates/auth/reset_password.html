{% extends "base.html" %}
{% block title %}Nueva Contraseña{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 mb-20 px-4 sm:px-0">
    <div class="bg-white p-6 sm:p-8 rounded-lg border border-gray-300 shadow-sm">
        <div class="text-center mb-6">
            <span class="material-icons-round text-6xl text-green-600 mb-3">password</span>
            <h1 class="text-2xl font-normal text-gray-900">Crear Nueva Contraseña</h1>
            <p class="text-sm text-gray-600 mt-2">Tu contraseña debe tener al menos 8 caracteres, una mayúscula, una minúscula y un número.</p>
        </div>
        
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label for="password" class="block text-sm font-bold text-gray-800 mb-1">Nueva Contraseña</label>
                <input type="password" id="password" name="password" required minlength="8"
                       class="w-full px-3 py-2 rounded border border-gray-400 focus:border-amazon-accent focus:ring-2 focus:ring-amazon-accent/50 outline-none transition-all">
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-bold text-gray-800 mb-1">Confirmar Contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                       class="w-full px-3 py-2 rounded border border-gray-400 focus:border-amazon-accent focus:ring-2 focus:ring-amazon-accent/50 outline-none transition-all">
            </div>
            
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2.5 rounded shadow-sm font-bold transition-colors">
                Actualizar Contraseña
            </button>
        </form>
    </div>
</div>
{% endblock %}
