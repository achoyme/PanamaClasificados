{% extends "base.html" %}
{% block title %}Recuperar Contraseña{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 mb-20 px-4 sm:px-0">
    <div class="text-center mb-6">
        <a href="{{ url_for('main.index') }}" class="text-3xl font-black text-amazon-base tracking-tight flex items-center justify-center gap-1">
            <span class="material-icons-round text-amazon-accent text-4xl">storefront</span>
            Panama<span class="font-normal text-gray-500">Classifieds</span>
        </a>
    </div>
    
    <div class="bg-white p-6 sm:p-8 rounded-lg border border-gray-300 shadow-sm">
        <div class="text-center mb-6">
            <span class="material-icons-round text-6xl text-amazon-accent mb-3">lock_reset</span>
            <h1 class="text-2xl font-normal text-gray-900">¿Olvidaste tu contraseña?</h1>
            <p class="text-sm text-gray-600 mt-2">Ingresa tu correo y te enviaremos instrucciones para restablecerla.</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label for="email" class="block text-sm font-bold text-gray-800 mb-1">Dirección de e-mail</label>
                <input type="email" id="email" name="email" required autofocus 
                       class="w-full px-3 py-2 rounded border border-gray-400 focus:border-amazon-accent focus:ring-2 focus:ring-amazon-accent/50 outline-none transition-all">
            </div>
            
            <button type="submit" class="w-full bg-amazon-accent hover:bg-amazon-hover text-amazon-base py-2.5 rounded shadow-sm font-bold transition-colors border border-[#a88734]">
                Enviar Instrucciones
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{{ url_for('auth.login') }}" class="text-sm text-blue-600 hover:text-amazon-hover hover:underline font-bold flex items-center justify-center gap-1">
                <span class="material-icons-round text-sm">arrow_back</span> Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
